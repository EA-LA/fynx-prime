<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA fallback
      // Save the full URL and redirect to the app root so the SPA router handles it
      sessionStorage.redirect = location.href;
      var base = '/fynx-prime/';
      location.replace(location.protocol + '//' + location.host + base);
    </script>
  </head>
  <body></body>
</html>
